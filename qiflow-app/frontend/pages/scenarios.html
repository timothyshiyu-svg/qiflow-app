<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>场景模式</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{ink:'#2d5f5d',amber:'#d4a373'}}}}</script></head>
<body class="bg-slate-50"><main class="max-w-md mx-auto p-4"><h1 class="text-2xl font-bold text-ink">四大疗愈场景</h1>
<div class="grid grid-cols-2 gap-2 mt-3" id="btns"></div><pre id="o" class="text-xs bg-white mt-3 p-3 rounded"></pre></main>
<script>
const map=[['sleep','睡眠改善'],['anxiety','工作焦虑'],['fatigue','疲劳恢复'],['mood','情绪调节']];
const b=document.getElementById('btns');
map.forEach(([k,n])=>{const x=document.createElement('button');x.className='bg-amber text-white rounded py-2';x.textContent=n;x.onclick=async()=>{const r=await fetch('http://localhost:8787/api/scenario/'+k);document.getElementById('o').textContent=JSON.stringify(await r.json(),null,2)};b.appendChild(x)});
</script></body></html>
